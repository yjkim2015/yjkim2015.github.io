    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
      /* 본문 내 details/summary 스타일 통일 */
      .page__content details {
        margin: 1em 0;
        border: 1px solid #c5e1a5;
        border-radius: 10px;
        background: linear-gradient(135deg, #fafff5 0%, #f1f8e9 50%, #e8f5e9 100%);
        box-shadow: 0 2px 10px rgba(76, 175, 80, 0.06);
        overflow: hidden;
      }
      .page__content details summary {
        padding: 0.8em 1.2em;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 0.5em;
        list-style: none;
      }
      .page__content details summary::-webkit-details-marker { display: none; }
      .page__content details summary::before { content: "🎯"; }
      .page__content details summary::after { content: " ▼"; font-size: 0.8em; color: #888; margin-left: auto; }
      .page__content details[open] summary::after { content: " ▲"; }
      .page__content details > *:not(summary) { padding: 0 1.2em 1em; }

      /* Mermaid 컨테이너 — 컴팩트 카드 */
      .mermaid {
        text-align: center;
        margin: 1.2em auto;
        padding: 0.6em;
        max-width: 100%;
        background: linear-gradient(135deg, #fafff5 0%, #f1f8e9 50%, #e8f5e9 100%);
        border: 1px solid #c5e1a5;
        border-radius: 10px;
        box-shadow: 0 2px 10px rgba(76, 175, 80, 0.06);
        overflow-x: auto;
      }
      .mermaid svg { max-width: 100% !important; height: auto !important; }
      .mermaid .node rect, .mermaid .node polygon { rx: 6; ry: 6; }
      .mermaid .node rect { min-height: 36px; }
      .mermaid .nodeLabel { font-size: 15px; padding: 4px 8px; }
    </style>
<script>
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.page__content img').forEach(function(img) {
    if (!img.hasAttribute('loading')) img.setAttribute('loading', 'lazy');
  });
});
</script>
