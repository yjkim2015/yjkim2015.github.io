<div class="page__footer-inner" style="max-width:1200px; margin:0 auto; padding:2em;">

  <!-- 하단 광고 -->
  <div class="footer-ad" style="text-align:center; margin-bottom:2em; padding:1.5em; background:#f9fafb; border-radius:12px; border:1px solid #eee;">
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-7225106491387870"
         data-ad-slot="0000000000"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  </div>

  <!-- 소셜 + 링크 -->
  <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; padding:1.5em 0; border-top:1px solid #eee;">
    <div style="font-size:0.9em; color:#666;">
      <strong style="color:#1a8917;">{{ site.title }}</strong>
      <span style="margin-left:0.5em; color:#aaa;">&copy; {{ site.time | date: '%Y' }} {{ site.name | default: site.title }}</span>
    </div>
    <ul class="social-icons" style="list-style:none; display:flex; gap:1em; margin:0; padding:0;">
      {% if site.footer.links %}
        {% for link in site.footer.links %}
          {% if link.label and link.url %}
            <li><a href="{{ link.url }}" rel="nofollow noopener noreferrer" style="color:#888; text-decoration:none; font-size:0.85em;"><i class="{{ link.icon | default: 'fas fa-link' }}" aria-hidden="true"></i> {{ link.label }}</a></li>
          {% endif %}
        {% endfor %}
      {% endif %}
      <li><a href="{% if site.atom_feed.path %}{{ site.atom_feed.path }}{% else %}{{ '/feed.xml' | relative_url }}{% endif %}" style="color:#888; text-decoration:none; font-size:0.85em;"><i class="fas fa-fw fa-rss-square" aria-hidden="true"></i> Feed</a></li>
    </ul>
  </div>

</div>
