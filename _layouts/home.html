---
layout: default
---

<div class="home-layout-flex">
  <!-- 왼쪽 사이드 광고 -->
  <aside class="sidebar-ad sidebar-ad--left">
    <div style="position:sticky; top:5em;">
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-7225106491387870"
           data-ad-slot="4201407843"
           data-ad-format="vertical"
           data-full-width-responsive="false"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>
  </aside>

  <!-- 중앙 콘텐츠 -->
  <div class="content-container home-content">
    {{ content }}

    {% if paginator %}
      {% assign posts = paginator.posts %}
    {% else %}
      {% assign posts = site.posts %}
    {% endif %}

    <div class="posts-grid">
      {% for post in posts %}
        {% include archive-single.html type="card" %}
      {% endfor %}
    </div>

    {% include paginator.html %}

    <!-- 하단 광고 -->
    <div class="ad-unit ad-unit--footer">
      <ins class="adsbygoogle"
           style="display:block; text-align:center;"
           data-ad-layout="in-article"
           data-ad-format="fluid"
           data-ad-client="ca-pub-7225106491387870"
           data-ad-slot="4201407843"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>
  </div>

  <!-- 오른쪽 사이드 광고 -->
  <aside class="sidebar-ad sidebar-ad--right">
    <div style="position:sticky; top:5em;">
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-7225106491387870"
           data-ad-slot="4201407843"
           data-ad-format="vertical"
           data-full-width-responsive="false"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>
  </aside>
</div>
