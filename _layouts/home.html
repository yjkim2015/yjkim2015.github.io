---
layout: default
---

<div style="display:flex; justify-content:center; gap:1.5em; max-width:1400px; margin:0 auto; padding:2em;">
  <!-- 왼쪽 사이드 광고 -->
  <aside style="width:160px; flex-shrink:0;">
    <div style="position:sticky; top:5em;">
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-7225106491387870"
           data-ad-slot="4201407843"
           data-ad-format="vertical"
           data-full-width-responsive="false"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>
  </aside>

  <!-- 중앙 콘텐츠 -->
  <div class="content-container" style="flex:1; min-width:0; max-width:900px;">
    {{ content }}

    {% if paginator %}
      {% assign posts = paginator.posts %}
    {% else %}
      {% assign posts = site.posts %}
    {% endif %}

    <div class="posts-grid">
      {% for post in posts %}
        {% include archive-single.html type="card" %}
      {% endfor %}
    </div>

    {% include paginator.html %}

    <!-- 하단 광고 -->
    <div style="text-align:center; margin:2em 0; padding:1.5em; background:#f9fafb; border-radius:12px; border:1px solid #eee;">
      <ins class="adsbygoogle"
           style="display:block; text-align:center;"
           data-ad-layout="in-article"
           data-ad-format="fluid"
           data-ad-client="ca-pub-7225106491387870"
           data-ad-slot="4201407843"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>
  </div>

  <!-- 오른쪽 사이드 광고 -->
  <aside style="width:160px; flex-shrink:0;">
    <div style="position:sticky; top:5em;">
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-7225106491387870"
           data-ad-slot="4201407843"
           data-ad-format="vertical"
           data-full-width-responsive="false"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>
  </aside>
</div>
