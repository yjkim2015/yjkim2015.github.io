---
layout: default
---

<div class="main-container">
  <div class="content-container">
    {{ content }}

    {% if paginator %}
      {% assign posts = paginator.posts %}
    {% else %}
      {% assign posts = site.posts %}
    {% endif %}

    {% for post in posts %}
      {% include archive-single.html %}
    {% endfor %}

    {% include paginator.html %}
  </div>
</div>
