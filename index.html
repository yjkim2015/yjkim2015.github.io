---
layout: home
author_profile: false
---

<div class="visitor-counter">
  <a href="https://hits.sh/yjkim2015.github.io/">
    <img src="https://hits.sh/yjkim2015.github.io.svg?view=today-total&style=flat-square&label=visitors&color=333&labelColor=f5f5f5" alt="Visitors"/>
  </a>
</div>

<div class="home-categories">
  <div class="home-categories__grid">
    {% assign sorted_cats = site.categories | sort %}
    {% for cat in sorted_cats %}
      <a href="/categories/{{ cat[0] | slugify }}/" class="category-chip">
        <span class="category-chip__name">{{ cat[0] }}</span>
      </a>
    {% endfor %}
  </div>
</div>
